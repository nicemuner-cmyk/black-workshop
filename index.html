<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
overflow:hidden;
}

/* خلفية فخمة */
.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at top, #1a1a1a, #000);
}

/* طبقة تأثير */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
backdrop-filter:blur(2px);
}

/* محتوى */
.content{
position:relative;
text-align:center;
z-index:2;
}

.title{
font-size:50px;
font-weight:bold;
letter-spacing:5px;
color:#f5c542;
}

.subtitle{
margin-top:10px;
color:#aaa;
font-size:16px;
}

.icon{
width:180px;
margin-bottom:20px;
filter:drop-shadow(0 0 20px rgba(245,197,66,0.5));
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* خط ذهبي */
.line{
width:120px;
height:2px;
background:#f5c542;
margin:20px auto;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">

<!-- شعار رمزي (ذئب + مفتاح بشكل فني) -->
<img class="icon" src="https://i.imgur.com/8QfZ4bF.png" alt="logo">

<div class="title">BLACKSHOP</div>
<div class="line"></div>

<div class="subtitle">
Professional Workshop Tools<br>
Power • Strength • Precision
</div>

</div>

</body>
</html>
