<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP | Tools Store</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: #111;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
}

.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 32px;
    color: #f5c542;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card h3 {
    color: #f5c542;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    background: #f5c542;
    border: none;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
}

footer {
    text-align: center;
    padding: 20px;
    background: #111;
    margin-top: 20px;
    font-size: 12px;
}
</style>
</head>
<body>

<header>
BLACKSHOP 🔧
</header>

<div class="hero">
<h1>Professional Workshop Tools</h1>
<p>High quality tools for professionals and workshops</p>
</div>

<div class="products">

<div class="card">
<h3>Drill Machine</h3>
<p>Strong and professional tool</p>
<button class="btn">Order Now</button>
</div>

<div class="card">
<h3>Impact Wrench</h3>
<p>High torque performance</p>
<button class="btn">Order Now</button>
</div>

<div class="card">
<h3>Tool Kit</h3>
<p>Complete workshop set</p>
<button class="btn">Order Now</button>
</div>

</div>

<footer>
BLACKSHOP © 2026 - Workshop Tools Store
</footer>

</body>
</html>
