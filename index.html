<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP | Workshop Tools</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#f5c542;
}

.hero{
padding:25px;
text-align:center;
background:#151515;
}

.hero h1{
margin:0;
color:#f5c542;
}

.hero p{
color:#aaa;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
}

.card h3{
color:#f5c542;
margin:0 0 10px 0;
}

.price{
color:#aaa;
margin-bottom:10px;
}

.btn{
width:100%;
padding:10px;
background:#f5c542;
border:none;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:15px;
color:#666;
font-size:12px;
margin-top:20px;
}
</style>

</head>

<body>

<header>BLACKSHOP 🔧 WORKSHOP TOOLS</header>

<div class="hero">
<h1>Professional Tools Store</h1>
<p>Powerful tools for workshops, mechanics & professionals</p>
</div>

<div class="grid">

<div class="card">
<h3>Drill Machine</h3>
<p class="price">$49 - High Power Drill</p>
<button class="btn">Order Now</button>
</div>

<div class="card">
<h3>Impact Wrench</h3>
<p class="price">$79 - Strong Torque Tool</p>
<button class="btn">Order Now</button>
</div>

<div class="card">
<h3>Tool Set</h3>
<p class="price">$99 - Complete Kit</p>
<button class="btn">Order Now</button>
</div>

<div class="card">
<h3>Angle Grinder</h3>
<p class="price">$59 - Cutting Power Tool</p>
<button class="btn">Order Now</button>
</div>

</div>

<footer>
BLACKSHOP © Workshop Equipment Store
</footer>

</body>
</html>
