<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
transition:0.3s;
}

.light{
background:#f5f5f5;
color:black;
}

header{
padding:15px;
text-align:center;
background:#000;
color:#f5c542;
font-weight:bold;
}

.container{padding:15px;}

input,button{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#f5c542;
border:none;
font-weight:bold;
cursor:pointer;
}

.product{
background:#222;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.light .product{
background:#ddd;
}

.topbar{
display:flex;
gap:10px;
}

.topbar button{
flex:1;
}
</style>
</head>

<body>

<header>BLACKSHOP STORE</header>

<div class="container">

<div class="topbar">
<button onclick="toggle()">Dark / Light</button>
</div>

<h3>Add Product</h3>
<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<button onclick="add()">Add</button>

<div id="list"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];

function add(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;

products.push({n,p});
localStorage.setItem("p",JSON.stringify(products));
render();
}

function render(){
let list=document.getElementById("list");
list.innerHTML="";
products.forEach(x=>{
list.innerHTML+=`
<div class="product">
<h3>${x.n}</h3>
<p>${x.p}</p>
</div>`;
});
}

function toggle(){
document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
