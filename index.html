<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
overflow:hidden;
}

/* خلفية فخمة */
.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at top, #1a1a1a, #000);
}

/* طبقة ضوء */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(0,0,0,0.9), rgba(0,0,0,0.4));
}

/* المحتوى */
.content{
position:relative;
text-align:center;
z-index:2;
}

/* 🔥 أيقونة الذئب الفخمة */
.wolf-icon{
font-size:45px;
letter-spacing:6px;
font-weight:bold;
color:#f5c542;
text-shadow:0 0 10px #f5c542, 0 0 25px rgba(245,197,66,0.6);
margin-bottom:15px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* اسم المتجر */
.title{
font-size:55px;
font-weight:bold;
letter-spacing:6px;
color:#f5c542;
text-shadow:0 0 20px rgba(245,197,66,0.4);
}

.line{
width:140px;
height:2px;
background:#f5c542;
margin:20px auto;
}

.subtitle{
color:#aaa;
font-size:16px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">

<div class="wolf-icon">𝕎𝕆𝕃𝔽</div>

<div class="title">BLACKSHOP</div>

<div class="line"></div>

<div class="subtitle">
Professional Workshop Tools<br>
Power • Strength • Precision
</div>

</div>

</body>
</html>
