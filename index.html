<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP STORE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
transition:0.3s;
}

header{
background:#000;
padding:15px;
text-align:center;
color:#f5c542;
font-weight:bold;
}

.container{padding:15px;}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:#f5c542;
border:none;
font-weight:bold;
cursor:pointer;
}

.product{
background:#1e1e1e;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.top{
display:flex;
gap:10px;
}

.top button{flex:1;}
</style>

</head>

<body>

<header>BLACKSHOP 🔧 STORE</header>

<div class="container">

<div class="top">
<button onclick="toggle()">Dark/Light</button>
<button onclick="changeBg()">BG</button>
</div>

<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button onclick="add()">Add</button>

<h3>News</h3>
<textarea id="news" placeholder="Write news"></textarea>
<button onclick="saveNews()">Save News</button>

<div id="newsBox"></div>
<div id="list"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("p")) || [];
let news = localStorage.getItem("n") || "";

function add(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let i=document.getElementById("img").value;

products.push({n,p,i});
localStorage.setItem("p",JSON.stringify(products));
render();
}

function render(){
let list=document.getElementById("list");
list.innerHTML="";

products.forEach(x=>{
list.innerHTML+=`
<div class="product">
<img src="${x.i}" width="100%">
<h3>${x.n}</h3>
<p>${x.p}</p>
</div>`;
});

document.getElementById("newsBox").innerHTML = "<p>"+news+"</p>";
}

function saveNews(){
news=document.getElementById("news").value;
localStorage.setItem("n",news);
render();
}

function toggle(){
document.body.classList.toggle("light");
}

function changeBg(){
document.body.style.background="#222";
}

render();

</script>

</body>
</html>
