<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHOP STORE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

header{
    background:#111;
    text-align:center;
    padding:20px;
    color:#f5c542;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.add-box{
    background:#1a1a1a;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#f5c542;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.product{
    background:#1a1a1a;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

.order{
    background:#f5c542;
    padding:8px;
    border:none;
    width:100%;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>

</head>

<body>

<header>BLACKSHOP 🔧 STORE</header>

<div class="container">

<div class="add-box">
<h3>Add Product</h3>
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<button onclick="addProduct()">Add</button>
</div>

<div id="list"></div>

</div>

<script>

let products = [];

function addProduct(){
    let name = document.getElementById('name').value;
    let price = document.getElementById('price').value;

    products.push({name,price});
    render();
}

function render(){
    let list = document.getElementById('list');
    list.innerHTML = "";

    products.forEach(p=>{
        list.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button class="order" onclick="order('${p.name}')">Order</button>
        </div>`;
    });
}

function order(name){
    let phone = "2189XXXXXXX";
    let msg = "I want to order: " + name;
    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
