display:flex;
justify-content:center;

}

.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at top, #1a1a1a, #000);
}

.overlay{
position:absolute;
width:100%;
height:100%;

.content{

.wolf{

margin-bottom:10px;
animation:float 4s ease-in-out infinite;
}

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.title{
font-size:50px;
font-weight:bold;
letter-spacing:5px;
color:#f5c542;
}

.line{
width:120px;
height:2px;
background:#f5c542;

.subtitle{
color:#aaa;
font-size:16px;
margin-bottom:20px;
}

/* أزرار السوشيال  */
.social{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.btn{
padding:12px;
border:none;
cursor:pointer;
font-weight:bold;
width:220px;
margin:auto;
border-radius:6px;
text-decoration:none;
display:block;
color:white;

.fb{background:#1877f2;}
.ig{background:#e1306c;}
